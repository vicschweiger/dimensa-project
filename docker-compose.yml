version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: dimensa_redis
    ports:
      - "6379:6379"

  api:
      build: .
      container_name: dimensa_api
      ports:
        - "8000:5000"
      env_file:
        - .env
      depends_on:
        - redis

  celery_worker:
      build: .
      container_name: dimensa_celery
      command: celery -A worker.celery_app worker --loglevel=info
      env_file:
        - .env
      depends_on:
        - redis